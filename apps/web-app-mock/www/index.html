<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <link rel="stylesheet" href="css/pico.min.css" />
    <title>Customer App POC (Firebase Auth)</title>
    <script src="js/config.js"></script>
    <script src="js/firebase-app-compat.js"></script>
    <script src="js/firebase-auth-compat.js"></script>
    <!--
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    -->
  </head>
  <body>
    <main class="container">
      <header>
        <h1>Customer App POC</h1>
        <p>Firebase Auth + Firebase API</p>
      </header>
      <section>
        <button type="button" id="btn-sign-in-google">
          Sign in with Google
        </button>
        <button type="button" id="btn-sign-out">Sign out</button>
      </section>
      <section>
        <button type="button" id="btn-health">GET Firebase API /health</button>
        <button type="button" id="btn-whoami-auth">
          GET /api/whoami (Authorization)
        </button>
        <button type="button" id="btn-whoami-forwarded">
          GET /api/whoami (X-Forwarded-Authorization)
        </button>
        <button type="button" id="btn-connectivity">GET /api/internal/connectivity</button>
      </section>
      <section>
        <h2>Log</h2>
        <pre id="log"></pre>
      </section>
    </main>
    <script src="js/auth-firebase.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
